<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>John Pierre's Resume</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        header {
            background-color: #1a1a2e;
            color: #fff;
            padding: 20px 0;
            text-align: center;
        }
        header h1 {
            color: #ffffff; /* Explicitly setting the color to white */
        }
        nav {
            display: flex;
            justify-content: center;
            background-color: #333;
        }
        nav a {
            color: white;
            padding: 15px 20px;
            text-decoration: none;
            display: inline-block;
        }
        nav a:hover {
            background-color: #444;
        }
        .container {
            width: 80%;
            margin: 20px auto;
            background: #fff;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1, h2 {
            color: #333;
        }
        p {
            line-height: 1.6;
        }
        .button {
            display: inline-block;
            padding: 10px 20px;
            margin-top: 10px;
            font-size: 16px;
            background-color: #1a1a2e;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        .button:hover {
            background-color: #333;
        }
    </style>
</head>
<body>
    <h2>Resume</h2>
    <p>You can view my resume below:</p>
    <p>
        <!-- Using embed for better browser support -->
        <embed src="John Pierre Resume 2025 - Copy.pdf" type="application/pdf" width="100%" height="600px" />
        <a href="John Pierre Resume 2025 - Copy.pdf" class="button" download>Download PDF</a>
        <a href="John Pierre Resume 2025 - Copy.pdf" target="_blank">Open in New Tab</a>
    </p>
</body>
</html>
